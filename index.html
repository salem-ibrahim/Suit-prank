<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suit Selection System</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #000; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            touch-action: manipulation;
        }
        .card {
            background: #111; padding: 30px; border-radius: 15px;
            text-align: center; border: 1px solid #333; 
            width: 90%; max-width: 400px; min-height: 400px;
            position: relative; overflow: hidden;
        }
        input {
            display: block; margin: 15px auto; padding: 12px; width: 85%;
            background: #222; border: 1px solid #444; color: white; border-radius: 8px;
        }
        button {
            padding: 15px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold;
            font-size: 16px; transition: all 0.1s ease; touch-action: none;
        }
        .btn-login { background: #fff; color: #000; width: 92%; margin-top: 10px; }
        #selection-page, #admin-page { display: none; }
        .options-wrapper { margin-top: 60px; position: relative; height: 200px; }
        #black-suit-btn { background: #2ecc71; color: white; width: 200px; position: relative; z-index: 10; }
        #other-color-btn {
            background: #e74c3c; color: white; width: 150px;
            position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 100;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #222; color: #aaa; }
    </style>
</head>
<body>

    <div id="login-page" class="card">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="selection-page" class="card">
        <h3>Welcome, <span id="display-name"></span></h3>
        <p>Pick your suit color:</p>
        <div class="options-wrapper">
            <button id="black-suit-btn" onclick="submitChoice('Black Suit')">Black Suit</button>
            <button id="other-color-btn">Other Color</button>
        </div>
    </div>

    <div id="admin-page" class="card">
        <h2>Admin Panel</h2>
        <div style="max-height: 300px; overflow-y: auto;">
            <table>
                <thead><tr><th>User</th><th>Choice</th></tr></thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
        <button style="margin-top:20px; background:#444; color:white;" onclick="location.reload()">Logout</button>
    </div>

    <script>
        const dbURL = "https://suit-c9761-default-rtdb.firebaseio.com/logs.json";
        let currentUser = "";

        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            if (user === "admin" && pass === "123") {
                showAdmin();
            } else if (user !== "") {
                currentUser = user;
                document.getElementById('display-name').innerText = user;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('selection-page').style.display = 'block';
            } else {
                alert("Please enter a username");
            }
        }

        function submitChoice(choice) {
            const data = { name: currentUser, choice: choice, date: new Date().toLocaleString() };
            fetch(dbURL, { method: "POST", body: JSON.stringify(data) })
            .then(() => {
                alert(" والله فهمان انك اختارت اسود ");
                location.reload();
            });
        }

        function showAdmin() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('admin-page').style.display = 'block';
            const body = document.getElementById('logs-body');
            body.innerHTML = "<tr><td colspan='2'>Syncing...</td></tr>";
            
            fetch(dbURL).then(res => res.json()).then(data => {
                body.innerHTML = "";
                if (data) {
                    Object.values(data).reverse().forEach(item => {
                        body.innerHTML += `<tr><td>${item.name}</td><td>${item.choice}</td></tr>`;
                    });
                } else {
                    body.innerHTML = "<tr><td colspan='2'>No data yet</td></tr>";
                }
            });
        }

        // Runaway Logic
        const btn = document.getElementById('other-color-btn');
        const card = document.getElementById('selection-page');

        function moveButton(e) {
            if(e) e.preventDefault();
            const pad = 40;
            const maxX = card.clientWidth - btn.offsetWidth - (pad * 2);
            const maxY = card.clientHeight - btn.offsetHeight - (pad * 2);
            btn.style.left = (Math.random() * maxX + pad) + 'px';
            btn.style.top = (Math.random() * maxY + pad) + 'px';
            btn.style.bottom = 'auto';
            btn.style.transform = 'none';
        }

        btn.addEventListener('mouseover', moveButton);
        btn.addEventListener('touchstart', moveButton, {passive: false});
    </script>
</body>
</html>
